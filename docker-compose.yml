version: '3.8'

services:
  # Redis service with persistence
  redis:
    image: redis:7-alpine
    container_name: cts-v3-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./data:/data/redis-snapshot
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --requirepass ${REDIS_PASSWORD:-default_password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "-a", "${REDIS_PASSWORD:-default_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cts-network

  # Database initialization service (runs once)
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cts-v3-db-init
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD:-default_password}@redis:6379
      - REDIS_PERSISTENCE=true
      - REDIS_SNAPSHOT_PATH=/data/redis-snapshot/redis-snapshot.json
      - INIT_ONLY=true
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: ["node", "scripts/init-database.js"]
    networks:
      - cts-network
    restart: "no"

  # Main application service
  cts-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cts-v3-app
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NEXT_PUBLIC_APP_URL=http://localhost:${PORT:-3001}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-default_password}@redis:6379
      - REDIS_PERSISTENCE=true
      - REDIS_SNAPSHOT_PATH=/data/redis-snapshot/redis-snapshot.json
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-in-production}
      - SESSION_SECRET=${SESSION_SECRET:-your-session-secret-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-encryption-key-change-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENABLE_LIVE_TRADING=${ENABLE_LIVE_TRADING:-false}
    depends_on:
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - cts-network

volumes:
  redis_data:
    driver: local

networks:
  cts-network:
    driver: bridge